<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comece a Criar — VARVOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <header class="auth-header">
        <a href="/" class="auth-logo">
          <div class="auth-logo-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
              <defs>
                <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" style="stop-color:#ff6b4a"/>
                  <stop offset="100%" style="stop-color:#9b59b6"/>
                </linearGradient>
              </defs>
              <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M2 17l10 5 10-5" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span>VARVOS</span>
        </a>
        <a href="/" class="auth-close" aria-label="Fechar">✕</a>
      </header>

      <div class="auth-body">
        <h1 class="auth-title">Comece a Criar.</h1>
        <p class="auth-subtitle">Crie uma conta <strong>gratuita</strong></p>

        <div class="auth-options" id="authOptions">
          <div id="googleAuthContainer">
            <button type="button" class="auth-btn auth-btn-google" id="btnGoogle" style="display:none">
              <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              Continuar com Google
            </button>
          </div>

          <div class="auth-divider">
            <span>OU</span>
          </div>

          <button type="button" class="auth-btn auth-btn-email" id="btnEmail">
            Continuar com e-mail
          </button>
        </div>

        <form id="emailForm" class="auth-email-form hidden">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
          <label for="passwordConfirm">Confirmar senha</label>
          <input type="password" id="passwordConfirm" name="password_confirm" placeholder="Repita a senha" autocomplete="new-password">
          <p class="auth-errors hidden" id="authErrors"></p>
          <button type="submit" class="auth-btn auth-btn-submit">Criar conta</button>
          <button type="button" class="auth-back" id="btnBack">← Voltar</button>
        </form>

        <p class="auth-legal">
          Ao continuar, você concorda com os <a href="#">Termos de Serviço</a> e <a href="#">Política de Privacidade</a>.
        </p>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth-supabase.js"></script>
  <script src="https://accounts.google.com/gsi/client" async></script>
  <script src="auth.js"></script>
</body>
</html>
